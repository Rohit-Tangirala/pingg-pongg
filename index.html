<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Pong Game - Neon Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        h1 {
            color: #0ef;
            font-size: 48px;
            text-shadow: 0 0 30px rgba(0, 239, 255, 1), 
                         0 0 60px rgba(255, 0, 255, 1);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }
        
        .scoreboard {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: bold;
        }
        
        .player-score, .computer-score {
            padding: 10px 20px;
            border-radius: 10px;
            text-shadow: 0 0 20px rgba(255, 0, 255, 1);
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #0ef;
            box-shadow: 0 0 20px rgba(0, 239, 255, 0.5);
        }
        
        .player-score {
            color: #ff00ff;
        }
        
        .computer-score {
            color: #ffff00;
        }
        
        #gameCanvas {
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), rgba(30, 30, 60, 0.9));
            border: 3px solid #0ef;
            box-shadow: 0 0 30px rgba(0, 239, 255, 0.8),
                        0 0 60px rgba(255, 0, 255, 0.6),
                        inset 0 0 20px rgba(0, 255, 255, 0.2);
            display: block;
        }
        
        .instructions {
            color: #0ef;
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 239, 255, 0.8);
            line-height: 1.6;
        }
        
        .paddle {
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.8);
        }
    </style>
</head>
<body>
    <h1>🎮 PONG NEON 🎮</h1>
    <div class="scoreboard">
        <div class="player-score">Player: <span id="playerScore">0</span></div>
        <div class="computer-score">Computer: <span id="computerScore">0</span></div>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="instructions">
        <p>⬆️ Arrow UP / ⬇️ Arrow DOWN - Move your paddle (Left)</p>
        <p>Press SPACE to start/reset the game</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let playerScore = 0;
        let computerScore = 0;
        let gameActive = false;

        // Paddle dimensions
        const paddleWidth = 10;
        const paddleHeight = 100;
        
        // Player paddle (left side)
        const player = {
            x: 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: 6,
            color: '#ff00ff'
        };

        // Computer paddle (right side)
        const computer = {
            x: canvas.width - paddleWidth - 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            speed: 5,
            color: '#ffff00'
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            dx: 5,
            dy: 5,
            speed: 5,
            color: '#00ff00'
        };

        // Keyboard controls
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') {
                gameActive = !gameActive;
                if (gameActive) {
                    ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
                    ball.dy = (Math.random() * 2 - 1) * 5;
                }
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        function drawPaddle(paddle) {
            ctx.fillStyle = paddle.color;
            ctx.shadowColor = paddle.color;
            ctx.shadowBlur = 20;
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.shadowBlur = 0;
        }

        function drawBall() {
            ctx.fillStyle = ball.color;
            ctx.shadowColor = '#00ff00';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawCenterLine() {
            ctx.strokeStyle = 'rgba(0, 239, 255, 0.3)';
            ctx.setLineDash([10, 10]);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function update() {
            if (!gameActive) return;

            // Update player paddle
            if (keys['ArrowUp'] && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown'] && player.y + player.height < canvas.height) {
                player.y += player.speed;
            }

            // Update ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom
            if (ball.y - ball.radius <= 0 || ball.y + ball.radius >= canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Ball collision with paddles
            if (ball.x - ball.radius <= player.x + player.width &&
                ball.y >= player.y &&
                ball.y <= player.y + player.height) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.radius;
            }

            if (ball.x + ball.radius >= computer.x &&
                ball.y >= computer.y &&
                ball.y <= computer.y + computer.height) {
                ball.dx = -ball.dx;
                ball.x = computer.x - ball.radius;
            }

            // Computer AI
            const computerCenter = computer.y + computer.height / 2;
            if (computerCenter < ball.y - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ball.y + 35) {
                computer.y -= computer.speed;
            }

            // Boundary check for computer paddle
            if (computer.y < 0) computer.y = 0;
            if (computer.y + computer.height > canvas.height) {
                computer.y = canvas.height - computer.height;
            }

            // Score points
            if (ball.x - ball.radius < 0) {
                computerScore++;
                document.getElementById('computerScore').textContent = computerScore;
                resetBall();
            }
            if (ball.x + ball.radius > canvas.width) {
                playerScore++;
                document.getElementById('playerScore').textContent = playerScore;
                resetBall();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() * 2 - 1) * 5;
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawCenterLine();
            drawPaddle(player);
            drawPaddle(computer);
            drawBall();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
