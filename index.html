<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        canvas {
            background: black;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        // Create the pong paddle
        const paddleWidth = 10, paddleHeight = 100;
        let player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: 'white' };
        let computer = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: 'white' };

        // Create the pong ball
        const ballSize = 10;
        let ball = { x: canvas.width / 2, y: canvas.height / 2, size: ballSize, speedX: 5, speedY: 5, color: 'white' };

        // Draw the object on the canvas
        function drawRect(x, y, width, height, color) {
            context.fillStyle = color;
            context.fillRect(x, y, width, height);
        }

        function drawCircle(x, y, size, color) {
            context.fillStyle = color;
            context.beginPath();
            context.arc(x, y, size, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
        }

        // Update game objects
        function update() {
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Ball collision with top and bottom
            if (ball.y + ball.size > canvas.height || ball.y - ball.size < 0) {
                ball.speedY = -ball.speedY;
            }

            // Ball collision with paddles
            if (ball.x + ball.size > computer.x && ball.y > computer.y && ball.y < computer.y + computer.height || 
                ball.x - ball.size < player.x + player.width && ball.y > player.y && ball.y < player.y + player.height) {
                ball.speedX = -ball.speedX;
            }

            // Reset ball if it goes out
            if (ball.x + ball.size > canvas.width || ball.x - ball.size < 0) {
                ball.x = canvas.width / 2;
                ball.y = canvas.height / 2;
                ball.speedX = -ball.speedX;
            }
        }

        // Draw the game
        function draw() {
            drawRect(0, 0, canvas.width, canvas.height, 'black');
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(computer.x, computer.y, computer.width, computer.height, computer.color);
            drawCircle(ball.x, ball.y, ball.size, ball.color);
        }

        // Game loop
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
